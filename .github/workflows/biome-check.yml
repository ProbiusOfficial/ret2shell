name: Biome check on web

on:
  push:
    paths:
      - ".github/workflows/web.yml"
      - "web/**"

  workflow_dispatch:

jobs:
  biome-web:
    name: Biome checks
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        shell: bash -lieo pipefail {0}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            web/package-lock.json
            web/yarn.lock

      - name: Install dependencies
        run: |
          pnpm config set --global registry '${{ vars.NPM_REGISTRY }}'
          pnpm --prefix web install

      - name: Build
        run: pnpm --prefix web format && pnpm --prefix web lint
