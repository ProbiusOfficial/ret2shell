platform:
  exposure:
    type: ingress
  ingress:
    className: nginx
    hosts:
      - host: ctf.example.com
        paths:
          - path: /
            pathType: Prefix
  config:
    server:
      externalDomain: ctf.example.com

postgresql:
  mode: external
  external:
    host: postgresql.example.com
    port: 5432
    database: ret2shell
    username: ret2shell
    password: replace-me
    sslMode: disable

valkey:
  mode: external
  external:
    url: redis://:replace-me@valkey.example.com:6379/0

nats:
  mode: external
  external:
    host: nats.example.com
    port: 4222
    token: replace-me
    tls: false

registry:
  mode: external
  external:
    server: registry.example.com
    external: registry.example.com
    insecure: false
    username: ""
    password: ""

victoriaLogs:
  mode: external
  external:
    url: http://victoria-logs.example.com:9428
